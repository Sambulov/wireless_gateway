<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      overflow: hidden;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .control-panel {
      background: #1e1e1e;
      padding: 10px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .control-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #ws-url {
      flex: 1;
      min-width: 300px;
      padding: 8px;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #fff;
      font-family: monospace;
    }

    .button {
      padding: 8px 16px;
      background: #0a84ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: sans-serif;
      font-weight: bold;
    }

    .status-indicator {
      padding: 8px 12px;
      background: #333;
      border-radius: 4px;
      margin-left: auto;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      background: #000;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    .footer-panel {
      background: #1a1a1a;
      padding: 10px;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .shortcuts {
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div class="control-panel">
      <div class="control-row">
        <input type="text" id="ws-url"
               value="ws://192.168.4.1/ws"
               placeholder="WebSocket URL">
        <button id="connect-btn" class="button">Connect</button>
        <button id="clear-btn" class="button">Clear</button>
        <button id="echo-btn" class="button">Echo: OFF</button>
        <div class="status-indicator" id="status">Disconnected</div>
      </div>
    </div>

    <div id="terminal-container">
      <div id="terminal"></div>
    </div>

    <div class="footer-panel">
      <div class="stats">
        <span>Status: <span id="connection-status">Disconnected</span></span>
        <span>Packets: <span id="packet-count">0</span></span>
        <span>Activity: <span id="last-activity">-</span></span>
      </div>
      <div class="shortcuts">
        <kbd>Ctrl+C</kbd> - Break |
        <kbd>Ctrl+L</kbd> - Clear screen
      </div>
    </div>
  </div>

  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="script.js"></script>
  <script>
    window.addEventListener('load', function() {
      window.espTerminal = new ESP32Terminal();
      window.addEventListener('resize', function() {
        window.espTerminal.fitAddon.fit();
      });
    });
  </script>
</body>
</html>
